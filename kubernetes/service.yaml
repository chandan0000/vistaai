
# Service for vistaai Backend
apiVersion: v1
kind: Service
metadata:
  name: vistaai-backend
  namespace: vistaai
  labels:
    app.kubernetes.io/name: vistaai
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: vistaai
    app.kubernetes.io/component: backend
